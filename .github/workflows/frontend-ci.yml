name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Job 1: Unit tests ───────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
          
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run unit tests
        working-directory: frontend
        run: npm run test

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e
        
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 10

  # ── Job 2: Build static artifact ────────────────────────────────────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage frontend files
        run: |
          mkdir -p dist
          cp frontend/index.html dist/
          cp -r frontend/css dist/
          cp -r frontend/js dist/
          cp -r frontend/img dist/

      - name: Inject backend API URL
        run: |
          BACKEND_URL="${{ vars.BACKEND_URL != '' && vars.BACKEND_URL || secrets.BACKEND_URL }}"
          if [ -n "${BACKEND_URL}" ]; then
            python3 -c 'import json,os,pathlib,sys;backend_url=os.environ.get("BACKEND_URL","").strip();\
          if not backend_url or backend_url=="***" or not (backend_url.startswith("http://") or backend_url.startswith("https://")):\
              print("BACKEND_URL must be a valid http(s) URL for production deploys on main branch");sys.exit(1);\
          pathlib.Path("dist/config.json").write_text(json.dumps({"apiBase":backend_url})+"\\n", encoding="utf-8");print("Injected runtime config into dist/config.json")'
                      echo "Using BACKEND_URL=${BACKEND_URL}"
                    else
                      echo "No BACKEND_URL provided; leaving api-base empty"
                      printf '{"apiBase":""}\n' > dist/config.json
                    fi

      - name: Require backend API URL (only for main deploys)
        if: github.ref == 'refs/heads/main'
        run: |
          python3 -c 'import json,pathlib,sys;config_path=pathlib.Path("dist/config.json");\
          if not config_path.exists():print("BACKEND_URL is required for production deploys on main branch");sys.exit(1);\
          try:backend_url=json.loads(config_path.read_text(encoding="utf-8")).get("apiBase","").strip()\
          except Exception:print("BACKEND_URL is required for production deploys on main branch");sys.exit(1);\
          if not backend_url or backend_url=="***" or not (backend_url.startswith("http://") or backend_url.startswith("https://")):print("BACKEND_URL is required for production deploys on main branch");sys.exit(1)'

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── Job 3: Deploy to GitHub Pages ───────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
