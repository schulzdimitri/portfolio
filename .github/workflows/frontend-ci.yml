name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Job 1: Unit tests ───────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
          
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run unit tests
        working-directory: frontend
        run: npm run test

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e
        
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 10

  # ── Job 2: Build static artifact ────────────────────────────────────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage frontend files
        run: |
          mkdir -p dist
          cp frontend/index.html dist/
          cp -r frontend/css dist/
          cp -r frontend/js dist/
          cp -r frontend/img dist/

      - name: Inject backend API URL
        run: |
          DEFAULT_BACKEND_URL="https://jellyfish-app-ows8l.ondigitalocean.app/"
          BACKEND_URL="${{ vars.BACKEND_URL != '' && vars.BACKEND_URL || secrets.BACKEND_URL }}"

          if [ -z "${BACKEND_URL}" ]; then
            BACKEND_URL="${DEFAULT_BACKEND_URL}"
          fi

          if [ -n "${BACKEND_URL}" ]; then
            case "$BACKEND_URL" in
              https://*)
                printf '{"apiBase":"%s"}\n' "$BACKEND_URL" > dist/config.json
                echo "Injected runtime config into dist/config.json"
                echo "Using BACKEND_URL=${BACKEND_URL}"
                ;;
              *)
                echo "BACKEND_URL must be a valid https URL for production deploys on main branch"
                exit 1
                ;;
            esac
          else
            echo "No BACKEND_URL provided; leaving api-base empty"
            printf '{"apiBase":""}\n' > dist/config.json
          fi

      - name: Require backend API URL (only for main deploys)
        if: github.ref == 'refs/heads/main'
        run: |
          if [ ! -f dist/config.json ]; then
            echo "BACKEND_URL is required for production deploys on main branch"
            exit 1
          fi
          # Extract apiBase value (simple JSON parse; assumes valid JSON produced above)
          backend_url=$(sed -n 's/.*"apiBase"[[:space:]]*:[[:space:]]*"\(.*\)".*/\1/p' dist/config.json | tr -d '\\r' | head -n1)
          if [ -z "$backend_url" ] || [ "$backend_url" = "***" ]; then
            echo "BACKEND_URL is required for production deploys on main branch"
            exit 1
          fi
          case "$backend_url" in
            https://*)
              echo "BACKEND_URL looks valid"
              ;;
            *)
              echo "BACKEND_URL is required to be https for production deploys on main branch"
              exit 1
              ;;
          esac

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── Job 3: Deploy to GitHub Pages ───────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
