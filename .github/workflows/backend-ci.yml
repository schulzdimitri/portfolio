name: Backend CI/CD

on:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]
  pull_request:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]

defaults:
  run:
    working-directory: backend

jobs:
  # ── Job 1: Static analysis ──────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: go vet
        run: go vet ./...

  # ── Job 2: Unit & integration tests ─────────────────────────────────────────
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.raw ./...

      - name: Filter coverage (exclude cmd/server)
        run: grep -v "cmd/server" coverage.raw > coverage.out

      - name: Coverage report
        run: go tool cover -func=coverage.out

      - name: Enforce coverage threshold (70%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          awk -v cov="$COVERAGE" 'BEGIN { if (cov+0 < 70) { print "FAIL: coverage " cov "% is below 70%"; exit 1 } }'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.out

  # ── Job 3: Binary compilation ────────────────────────────────────────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o server ./cmd/server

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: backend/server

  # ── Job 4: Docker build & push (main only) ──────────────────────────────────
  docker:
    name: Docker
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

  # ── Job 5: Deploy to DigitalOcean Droplet (main only) ───────────────────────
  deploy:
    name: Deploy
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          password: ${{ secrets.DO_PASSWORD }}
          envs: SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASSWORD,CONTACT_TO_EMAIL
          script: |
            echo "Pulling latest image from GHCR..."
            docker pull ghcr.io/${{ github.repository }}/backend:latest
            
            echo "Stopping existing container..."
            docker stop portfolio-backend || true
            docker rm portfolio-backend || true
            
            echo "Creating data directory if it doesn't exist..."
            mkdir -p /root/portfolio-data
            
            echo "Running new container..."
            docker run -d \
              --name portfolio-backend \
              -p 8080:8080 \
              -v /root/portfolio-data:/app/data \
              -e SMTP_HOST="$SMTP_HOST" \
              -e SMTP_PORT="$SMTP_PORT" \
              -e SMTP_USER="$SMTP_USER" \
              -e SMTP_PASSWORD="$SMTP_PASSWORD" \
              -e CONTACT_TO_EMAIL="$CONTACT_TO_EMAIL" \
              --restart unless-stopped \
              ghcr.io/${{ github.repository }}/backend:latest
            
            echo "Cleanup old dangling images..."
            docker image prune -af
